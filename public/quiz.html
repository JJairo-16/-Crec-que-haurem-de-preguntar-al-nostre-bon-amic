<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Quiz</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding-top: 50px;
    }

    #app {
      width: 600px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      padding: 10px;
      cursor: pointer;
      border-radius: 5px;
      border: 1px solid #ccc;
      background: #eee;
    }

    button:hover {
      background: #ddd;
    }

    .correct {
      border: 2px solid green;
    }

    .wrong {
      border: 2px solid red;
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="js/quiz.js"></script>
</body>
</html>
