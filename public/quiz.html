<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preguntem al nostre amic</title>
    <link rel="stylesheet" href="css/quiz.css">
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
</head>

<body>
    <section id="screen-inici" class="screen" style="display: none;">
        <div id="section-name-input" class="container">
            <h1>Preguntem al nostre amic</h1>
            <div class="form-group">
                <label for="user-name">Ingresa el teu nom:</label>
                <input type="text" id="user-name" placeholder="El teu nom..." maxlength="50">
            </div>
            <button id="btn-enter" class="btn">Entrar</button>
        </div>

        <div id="section-category-select" class="container">
            <h2 id="welcome-text">Hola, <span id="display-name">[Nom]</span>!</h2>
            <p class="category-label">Categoria:</p>
            <div class="category-grid" id="category-grid"></div>
            <button id="btn-start-game" class="btn">Comenzar</button>
        </div>
    </section>

    <section id="screen-joc" class="screen">
        <div class="quiz-container">
            
            <h2 class="category-theme">Tema: <span id="current-theme">Història</span></h2>
            
            <div class="question-counter">
                Pregunta <span id="current-question">2</span> de <span id="total-questions">24</span> (0%)
            </div>
            
            <div class="score-display">
                Puntuació: <span id="current-score">0</span>
            </div>

            <div class="progress-container">
                <div id="progress-bar" class="progress-fill"></div>
            </div>

            <div class="question-box">
                <p id="question-text">PREGUNTA: ....</p>
            </div>

            <div class="options-grid">
                <button class="option-btn" id="option-a">Opció A</button> <button class="option-btn" id="option-b">Opció B</button>
                <button class="option-btn" id="option-c">Opció C</button> <button class="option-btn" id="option-d">Opció D</button>
            </div>

            <div class="quiz-footer">
                <button id="btn-leave" class="btn-leave">Abandonar quiz</button>
            </div>

        </div>
    </section>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
